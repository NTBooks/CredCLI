<!--CREDCLI:{"name":"Collectible Declaration","description":"Blockchain-verified declaration for limited edition items, digital collectibles, or authenticated memorabilia","width":1200,"height":900,"fields":["FullName","Title","CourseName","Achievement","BadgeLevel","Institution","Issuer","IssueDate","CredentialID","Signature","Notes","QRUrl","VerificationURL","WorkspaceLogo","WorkspaceIssuer"]}-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Collectible Declaration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { width: 1200px; height: 900px; overflow: hidden; font-family: 'Inter', sans-serif; }

  .page {
    width: 1200px; height: 900px;
    position: relative;
    background: #0d0b1e;
    overflow: hidden;
  }

  /* Background layers */
  .bg-glow {
    position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(97,103,201,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(97,103,201,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(97,103,201,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Rarity border — JS sets the class on .rarity-frame */
  .rarity-frame {
    position: absolute; inset: 20px;
    border-radius: 12px;
    border: 2px solid;
    pointer-events: none;
    z-index: 1;
  }
  .rarity-frame.Legendary { border-color: #e040fb; box-shadow: 0 0 40px rgba(224,64,251,0.25), inset 0 0 40px rgba(224,64,251,0.04); }
  .rarity-frame.Gold      { border-color: #f9d423; box-shadow: 0 0 40px rgba(249,212,35,0.25), inset 0 0 40px rgba(249,212,35,0.04); }
  .rarity-frame.Platinum  { border-color: #e0f0f8; box-shadow: 0 0 40px rgba(200,230,245,0.2), inset 0 0 40px rgba(200,230,245,0.03); }
  .rarity-frame.Silver    { border-color: #c0c0c0; box-shadow: 0 0 30px rgba(192,192,192,0.2), inset 0 0 30px rgba(192,192,192,0.03); }
  .rarity-frame.Bronze    { border-color: #cd7f32; box-shadow: 0 0 30px rgba(205,127,50,0.2), inset 0 0 30px rgba(205,127,50,0.03); }
  .rarity-frame.default   { border-color: rgba(97,103,201,0.5); }

  /* Content */
  .content {
    position: relative; z-index: 2;
    height: 100%;
    display: flex; flex-direction: column;
    padding: 44px 64px 36px;
  }

  /* Header row */
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 36px;
  }
  .header-brand { display: flex; align-items: center; gap: 14px; }
  .header-org { color: rgba(255,255,255,0.9); font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .header-location { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 2px; }

  .rarity-pill {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 7px 20px; border-radius: 128px; border: 1px solid;
  }
  .rarity-pill.Legendary { color: #e040fb; border-color: #e040fb; background: rgba(224,64,251,0.1); }
  .rarity-pill.Gold      { color: #f9d423; border-color: #f9d423; background: rgba(249,212,35,0.1); }
  .rarity-pill.Platinum  { color: #e0f0f8; border-color: #e0f0f8; background: rgba(200,230,245,0.1); }
  .rarity-pill.Silver    { color: #d0d0d0; border-color: #d0d0d0; background: rgba(192,192,192,0.1); }
  .rarity-pill.Bronze    { color: #daa520; border-color: #daa520; background: rgba(205,127,50,0.1); }
  .rarity-pill.default   { color: #a5b4fc; border-color: rgba(97,103,201,0.5); background: rgba(97,103,201,0.1); }

  /* Centre: item info */
  .item-section {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }

  .declaration-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(255,255,255,0.3);
    margin-bottom: 16px;
  }

  .item-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 52px; font-weight: 900;
    color: white; letter-spacing: -0.04em;
    line-height: 1.0; margin-bottom: 10px;
    text-wrap: balance;
  }

  .collection-name {
    font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.5);
    letter-spacing: 0.02em; margin-bottom: 6px;
  }

  .edition-info {
    font-size: 13px; color: rgba(255,255,255,0.35);
    font-family: 'Inter', sans-serif;
    margin-bottom: 20px;
  }

  .divider-line {
    width: 120px; height: 1px;
    background: rgba(97,103,201,0.4);
    margin: 0 auto 20px;
  }

  .item-description {
    font-size: 14px; color: rgba(255,255,255,0.5);
    line-height: 1.7; max-width: 560px;
    font-style: italic;
  }

  /* Bottom row */
  .bottom-row {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .sig-block { display: flex; flex-direction: column; gap: 3px; }
  .sig-line { width: 140px; height: 1px; background: rgba(255,255,255,0.3); margin-bottom: 4px; }
  .sig-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); }
  .sig-title { font-size: 10px; color: rgba(255,255,255,0.35); }

  .meta-block { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .token-id-label { font-size: 8px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .token-id {
    font-family: 'Courier New', monospace;
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.05em;
  }

  .issue-block { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .issue-label { font-size: 9px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .issue-date { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); }
  .issue-by { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }

  .opt { display: block; }
</style>
</head>
<body>
<div class="page">
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="rarity-frame default" id="rarityFrame"></div>

  <div class="content">

    <!-- Header -->
    <div class="header-row">
      <div class="header-brand">
        <img src="{{WorkspaceLogo}}" alt="{{WorkspaceIssuer}}" style="height:44px;width:auto;max-width:160px;object-fit:contain;filter:brightness(0) invert(1);opacity:0.85;" onerror="this.style.display='none'">
        <div>
          <div class="header-org">{{WorkspaceIssuer}}</div>
        </div>
      </div>
      <div class="rarity-pill default" id="rarityPill">{{BadgeLevel}}</div>
    </div>

    <!-- Item -->
    <div class="item-section">
      <div class="declaration-label">Collectible Declaration</div>
      <div class="item-name">{{FullName}}</div>
      <div class="collection-name opt">{{Title}}</div>
      <div class="edition-info opt">{{CourseName}}</div>
      <div class="divider-line"></div>
      <div class="item-description opt">{{Achievement}}</div>
    </div>

    <!-- Bottom -->
    <div class="bottom-row">
      <div class="sig-block">
        <div class="sig-line"></div>
        <div class="sig-name">{{Issuer}}</div>
        <div class="sig-title opt">{{Signature}}</div>
      </div>

      <div class="meta-block">
        <div class="token-id-label">Token / Edition ID</div>
        <div class="token-id">{{CredentialID}}</div>
        <a href="https://chainletterlabs.com" target="_blank" style="display:inline-flex;align-items:center;gap:5px;text-decoration:none;margin-top:6px;opacity:0.65;">
          <span style="font-size:7px;font-family:sans-serif;letter-spacing:1px;text-transform:uppercase;color:#a5b4fc;white-space:nowrap;">Powered by</span>
          <svg height="12" width="99" viewBox="0 0 1220 148" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;display:block;vertical-align:middle;filter:brightness(0) invert(1);"><g transform="matrix(4.16667,0,0,4.16667,142.104,0)"><path d="M0,27.3L-34.105,0L34.105,0L0,27.3Z" style="fill:rgb(85,177,227);"/></g><g transform="matrix(4.16667,0,0,4.16667,142.104,147.657)"><path d="M0,-27.3L-34.105,0L34.105,0L0,-27.3Z" style="fill:rgb(85,177,227);"/></g><g transform="matrix(4.16667,0,0,4.16667,373.779,105.98)"><path d="M0,-15.654L-4.939,-13.374C-5.889,-15.198 -7.409,-16.261 -9.803,-16.261C-13.792,-16.261 -16.072,-12.766 -16.072,-7.827C-16.072,-3.04 -13.754,0.608 -9.765,0.608C-7.371,0.608 -5.965,-0.418 -4.56,-2.774L-0.076,-0.114C-1.9,3.648 -5.091,5.889 -9.917,5.889C-16.87,5.889 -21.543,0.57 -21.543,-7.827C-21.543,-15.92 -16.68,-21.543 -9.727,-21.543C-4.711,-21.543 -1.672,-19.111 0,-15.654" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,473.685,17.9596)"><path d="M0,26.596L-5.319,26.596L-5.319,15.426L-16.224,15.426L-16.224,26.596L-21.543,26.596L-21.543,0L-16.224,0L-16.224,10.183L-5.319,10.183L-5.319,0L0,0L0,26.596Z" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,548.046,63.7117)"><path d="M0,4.635L-1.71,-0.19C-2.242,-1.748 -2.774,-3.344 -3.04,-4.332C-3.306,-3.344 -3.838,-1.748 -4.37,-0.19L-6.079,4.635L0,4.635ZM9.763,15.615L3.913,15.615L1.823,9.689L-7.903,9.689L-9.993,15.615L-15.692,15.615L-5.51,-10.98L-0.343,-10.98L9.763,15.615Z" style="fill:rgb(76,76,78);"/></g><g transform="matrix(-4.16667,0,0,4.16667,1912.99,-2577.28)"><rect x="310.152" y="622.858" width="5.318" height="26.596" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,729.245,17.9596)"><path d="M0,26.596L-4.749,26.596L-14.514,12.082C-15.159,11.094 -16.033,9.765 -16.375,9.08C-16.375,10.069 -16.299,13.412 -16.299,14.894L-16.299,26.596L-21.542,26.596L-21.542,0L-16.451,0L-7.028,14.058C-6.383,15.046 -5.509,16.375 -5.167,17.06C-5.167,16.072 -5.243,12.728 -5.243,11.246L-5.243,0L0,0L0,26.596Z" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,809.889,17.9596)"><path d="M0,26.596L-14.894,26.596L-14.894,0L-13.146,0L-13.146,25L0,25L0,26.596Z" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,887.848,17.9596)"><path d="M0,26.596L-15.615,26.596L-15.615,0L-0.569,0L-0.569,1.596L-13.867,1.596L-13.867,11.626L-5.812,11.626L-5.812,13.222L-13.867,13.222L-13.867,25L0,25L0,26.596Z" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,971.482,122.126)"><path d="M0,-23.404L-8.245,-23.404L-8.245,1.596L-9.993,1.596L-9.993,-23.404L-18.237,-23.404L-18.237,-25L0,-25L0,-23.404Z" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,1056.35,122.126)"><path d="M0,-23.404L-8.245,-23.404L-8.245,1.596L-9.993,1.596L-9.993,-23.404L-18.237,-23.404L-18.237,-25L0,-25L0,-23.404Z" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,1134.07,17.9596)"><path d="M0,26.596L-15.615,26.596L-15.615,0L-0.569,0L-0.569,1.596L-13.867,1.596L-13.867,11.626L-5.812,11.626L-5.812,13.222L-13.867,13.222L-13.867,25L0,25L0,26.596Z" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,1212.11,98.3812)"><path d="M0,-12.006C0,-16.11 -2.583,-17.705 -6.877,-17.705L-13.943,-17.705L-13.943,-6.117L-7.333,-6.117C-2.545,-6.117 0,-7.941 0,-12.006M1.748,-12.044C1.748,-7.827 -0.76,-5.434 -4.825,-4.749L1.292,7.295L-0.722,7.295L-6.687,-4.522L-13.943,-4.522L-13.943,7.295L-15.691,7.295L-15.691,-19.301L-6.801,-19.301C-1.861,-19.301 1.748,-17.287 1.748,-12.044" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,144.104,-1.13687e-13)"><path d="M11.969,17.719L0,27.3L-11.969,17.719L0,8.138L11.969,17.719Z" style="fill:rgb(0,148,212);"/></g></svg>
        </a>
      </div>

      <div class="issue-block">
        <div class="issue-label">Declared on</div>
        <div class="issue-date">{{IssueDate}}</div>
        <div class="issue-by opt">{{Institution}}</div>
      </div>
    </div>

  </div>
</div>

<script>
  const level = '{{BadgeLevel}}';
  const tiers = ['Legendary','Gold','Platinum','Silver','Bronze'];
  const cls = tiers.includes(level) ? level : 'default';

  const frame = document.getElementById('rarityFrame');
  if (frame) { frame.className = 'rarity-frame ' + cls; }

  const pill = document.getElementById('rarityPill');
  if (pill) {
    pill.className = 'rarity-pill ' + cls;
    if (!level.trim()) pill.style.display = 'none';
  }

  // Hide empty optional elements
  document.querySelectorAll('.opt').forEach(el => {
    if (!el.textContent.trim()) el.style.display = 'none';
  });
</script>
</body>
</html>
