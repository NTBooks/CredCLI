<!--CREDCLI:{"name":"Achievement Badge","description":"Digital achievement badge with level indicator","width":600,"height":600,"fields":["FullName","CourseName","Institution","Issuer","IssueDate","CredentialID","BadgeLevel","Achievement","Notes","QRUrl","VerificationURL","WorkspaceLogo","WorkspaceIssuer"]}-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>Achievement Badge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 600px; height: 600px; overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }

  .page {
    width: 600px; height: 600px;
    position: relative;
    background: #0f0c29;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1060 50%, #24243e 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* Starburst background */
  .starburst {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 520px; height: 520px;
    background: repeating-conic-gradient(
      rgba(255,255,255,0.015) 0deg, rgba(255,255,255,0.015) 10deg,
      transparent 10deg, transparent 20deg
    );
    border-radius: 50%;
  }

  /* Level-based colour accent ring */
  .accent-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 450px; height: 450px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.06);
  }

  /* Badge hex/circle container */
  .badge-container {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 0;
  }

  /* Outer glow ring */
  .badge-ring {
    width: 280px; height: 280px;
    border-radius: 50%;
    padding: 6px;
    position: relative;
  }
  .badge-ring.Gold     { background: conic-gradient(#f9d423, #f9a825, #ffd54f, #f9d423); box-shadow: 0 0 40px rgba(249,212,35,0.5); }
  .badge-ring.Platinum { background: conic-gradient(#e8f4f8, #b0c4cc, #e8f4f8, #b0c4cc); box-shadow: 0 0 40px rgba(200,220,230,0.5); }
  .badge-ring.Silver   { background: conic-gradient(#c0c0c0, #808080, #e0e0e0, #c0c0c0); box-shadow: 0 0 40px rgba(160,160,160,0.4); }
  .badge-ring.Bronze   { background: conic-gradient(#cd7f32, #a0522d, #daa520, #cd7f32); box-shadow: 0 0 40px rgba(205,127,50,0.4); }

  .badge-face {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(145deg, #1c1650, #0d0a2e);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .badge-face::before {
    content: '';
    position: absolute; top: 10%; left: 20%;
    width: 60%; height: 35%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.07), transparent);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Trophy icon SVG */
  .badge-icon { width: 64px; height: 64px; }

  .badge-name {
    font-size: 13px; font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.3;
    color: white;
    max-width: 200px;
  }

  .badge-level-pill {
    font-size: 9px; font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: 20px;
    border: 1px solid;
  }
  .pill-Gold     { color: #f9d423; border-color: #f9d423; background: rgba(249,212,35,0.12); }
  .pill-Platinum { color: #dde9ed; border-color: #dde9ed; background: rgba(220,235,240,0.12); }
  .pill-Silver   { color: #d0d0d0; border-color: #d0d0d0; background: rgba(200,200,200,0.12); }
  .pill-Bronze   { color: #daa520; border-color: #daa520; background: rgba(205,127,50,0.12); }

  /* Recipient */
  .recipient-section {
    text-align: center; z-index: 2; margin-top: 14px;
  }
  .awarded-to { font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
  .recipient-name { font-size: 20px; font-weight: 700; color: white; }
  .recipient-org  { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }

  /* Achievement */
  .achievement-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.55);
    text-align: center;
    max-width: 360px;
    line-height: 1.45;
    margin-top: 6px;
    z-index: 2;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 24px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 3;
  }

  .bottom-left { display: flex; flex-direction: column; }
  .issued-label { font-size: 8px; color: rgba(255,255,255,0.35); letter-spacing: 1.5px; text-transform: uppercase; }
  .issued-date  { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7); }
  .cred-id-text { font-size: 8px; font-family: monospace; color: rgba(255,255,255,0.25); margin-top: 2px; }

  .logo-wrap img { max-height: 44px; max-width: 80px; object-fit: contain; border-radius: 4px; }
  .issuer-name { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.85); letter-spacing: 0.3px; }
  .cl-stripe { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: rgba(97,103,201,0.55); z-index: 10; }
  .opt { display: block; }
</style>
</head>
<body>
<div class="page">
  <div class="cl-stripe"></div>
  <div class="starburst"></div>
  <div class="accent-ring"></div>

  <div class="badge-container">
    <div class="badge-ring {{BadgeLevel}}" id="badgeRing">
      <div class="badge-face">
        <!-- Trophy icon -->
        <svg class="badge-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 4L38 18H54L42 28L46 44L32 35L18 44L22 28L10 18H26L32 4Z" fill="currentColor" opacity="0.9"/>
          <rect x="26" y="46" width="12" height="4" rx="1" fill="currentColor" opacity="0.7"/>
          <rect x="22" y="50" width="20" height="4" rx="2" fill="currentColor" opacity="0.6"/>
        </svg>
        <div class="badge-name">{{CourseName}}</div>
        <div class="badge-level-pill pill-{{BadgeLevel}}">{{BadgeLevel}}</div>
      </div>
    </div>
  </div>

  <div class="recipient-section">
    <div class="awarded-to">Awarded to</div>
    <div class="recipient-name">{{FullName}}</div>
    <div class="recipient-org opt">{{Institution}}</div>
  </div>

  <div class="achievement-text opt">{{Achievement}}</div>

  <div class="bottom-bar">
    <div class="bottom-left">
      <div class="issuer-name">{{WorkspaceIssuer}}</div>
      <div class="issued-date">{{IssueDate}}</div>
      <div class="cred-id-text opt">{{CredentialID}}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
      <a href="https://chainletterlabs.com" target="_blank" style="display:inline-flex;align-items:center;gap:4px;text-decoration:none;opacity:0.55;">
        <span style="font-size:6px;font-family:sans-serif;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.8);white-space:nowrap;">Powered by</span>
        <svg width="52" viewBox="0 0 1220 148" xmlns="http://www.w3.org/2000/svg" style="height:6px;fill-rule:evenodd;clip-rule:evenodd;filter:brightness(0) invert(1);"><g transform="matrix(4.16667,0,0,4.16667,142.104,0)"><g><path d="M0,27.3L-34.105,0L34.105,0L0,27.3Z" style="fill:rgb(85,177,227);fill-rule:nonzero;"/></g></g><g transform="matrix(4.16667,0,0,4.16667,142.104,147.657)"><g><path d="M0,-27.3L-34.105,0L34.105,0L0,-27.3Z" style="fill:rgb(85,177,227);"/></g></g><g transform="matrix(4.16667,0,0,4.16667,373.779,105.98)"><path d="M0,-15.654L-4.939,-13.374C-5.889,-15.198 -7.409,-16.261 -9.803,-16.261C-13.792,-16.261 -16.072,-12.766 -16.072,-7.827C-16.072,-3.04 -13.754,0.608 -9.765,0.608C-7.371,0.608 -5.965,-0.418 -4.56,-2.774L-0.076,-0.114C-1.9,3.648 -5.091,5.889 -9.917,5.889C-16.87,5.889 -21.543,0.57 -21.543,-7.827C-21.543,-15.92 -16.68,-21.543 -9.727,-21.543C-4.711,-21.543 -1.672,-19.111 0,-15.654" style="fill:rgb(76,76,78);fill-rule:nonzero;"/></g><g transform="matrix(4.16667,0,0,4.16667,473.685,17.9596)"><path d="M0,26.596L-5.319,26.596L-5.319,15.426L-16.224,15.426L-16.224,26.596L-21.543,26.596L-21.543,0L-16.224,0L-16.224,10.183L-5.319,10.183L-5.319,0L0,0L0,26.596Z" style="fill:rgb(76,76,78);fill-rule:nonzero;"/></g><g transform="matrix(4.16667,0,0,4.16667,548.046,63.7117)"><path d="M0,4.635L-1.71,-0.19C-2.242,-1.748 -2.774,-3.344 -3.04,-4.332C-3.306,-3.344 -3.838,-1.748 -4.37,-0.19L-6.079,4.635L0,4.635ZM9.763,15.615L3.913,15.615L1.823,9.689L-7.903,9.689L-9.993,15.615L-15.692,15.615L-5.51,-10.98L-0.343,-10.98L9.763,15.615Z" style="fill:rgb(76,76,78);fill-rule:nonzero;"/></g><g transform="matrix(-4.16667,0,0,4.16667,1912.99,-2577.28)"><rect x="310.152" y="622.858" width="5.318" height="26.596" style="fill:rgb(76,76,78);"/></g><g transform="matrix(4.16667,0,0,4.16667,729.245,17.9596)"><path d="M0,26.596L-4.749,26.596L-14.514,12.082C-15.159,11.094 -16.033,9.765 -16.375,9.08C-16.375,10.069 -16.299,13.412 -16.299,14.894L-16.299,26.596L-21.542,26.596L-21.542,0L-1 8,212);"/></g></g></svg>
      </a>
    </div>
    <div class="logo-wrap">
      <img src="{{WorkspaceLogo}}" alt="{{WorkspaceIssuer}}" onerror="this.style.display='none'">
    </div>
  </div>
</div>

<script>
  // Apply level colour to trophy icon
  const level = '{{BadgeLevel}}';
  const colours = { Gold: '#f9d423', Platinum: '#dde9ed', Silver: '#c0c0c0', Bronze: '#cd7f32' };
  const svg = document.querySelector('.badge-icon');
  if (svg) svg.style.color = colours[level] || '#a5b4fc';

  // Hide badge ring level class if no level set
  const ring = document.getElementById('badgeRing');
  if (ring && !colours[level]) ring.className = 'badge-ring';

  // Hide level pill if empty
  const pill = document.querySelector('.badge-level-pill');
  if (pill && !level.trim()) pill.style.display = 'none';

  // Hide empty optional elements
  document.querySelectorAll('.opt').forEach(el => {
    if (!el.textContent.trim()) el.style.display = 'none';
  });
</script>
</body>
</html>
