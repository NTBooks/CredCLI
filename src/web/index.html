    const count = data.filesStamped ?? 0;
    toast(`Collection stamped — ${count} file${count !== 1 ? 's' : ''} recorded on the blockchain`);
    loadStampSection(jobId, { chainletterSent: true, chainletterStamped: true, chainletterStampedAt: new Date().toISOString() });
  } catch(e) {
    toast(`Stamp failed: ${e.message}`, 'error');
    if (result) result.textContent = `Error: ${e.message}`;
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-patch-check"></i> Stamp Collection';
  }
}
window.stampChainletter = stampChainletter;

// ── New Template modal ────────────────────────────────────────────────────────
function showNewTemplateModal() {
  const m = document.getElementById('new-tmpl-modal');
  if (m) { m.style.display = 'flex'; document.getElementById('new-tmpl-name').focus(); }
}
function hideNewTemplateModal() {
  const m = document.getElementById('new-tmpl-modal');
  if (m) m.style.display = 'none';
}
window.showNewTemplateModal = showNewTemplateModal;
window.hideNewTemplateModal = hideNewTemplateModal;

async function createNewTemplate() {
  const name = document.getElementById('new-tmpl-name')?.value?.trim();
  const size = document.getElementById('new-tmpl-size')?.value || '1200x900';
  const errEl = document.getElementById('new-tmpl-err');
  const btn   = document.getElementById('create-tmpl-btn');

  if (!name) { errEl.textContent = 'Please enter a template name.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const [width, height] = size.split('x').map(Number);
  btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creating…';

  try {
    const { file } = await API.post('/api/templates', { name, width, height });
    hideNewTemplateModal();
    toast(`Template "${name}" created`);
    navigate(`#/templates/edit/${encodeURIComponent(file)}`);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-plus-lg"></i> Create & Edit';
  }
}
window.createNewTemplate = createNewTemplate;

// ── Workspace Settings ─────────────────────────────────────────────────────────
let _pendingLogo = null; // base64 data URL staged before save

async function renderSettings() {
  setBreadcrumb([{ label: 'Workspace Settings' }]);
  setPage(`<div class="spinner-wrap"><i class="bi bi-arrow-repeat spin"></i> Loading…</div>`);
  const ws = await API.get('/api/workspace');
  _pendingLogo = ws.logo || null;
  const smtp = ws.smtp || {};

  const logoAreaContent = ws.logo
    ? `<img id="logo-preview-img" class="logo-preview" src="${ws.logo}" alt="Logo preview">
       <div style="font-size:12px;color:var(--muted)">Click or drop to replace</div>`
    : `<i class="bi bi-image" style="font-size:32px;color:var(--navy);opacity:0.3;display:block;margin-bottom:8px"></i>
       <div style="font-size:13px;font-weight:600">Drop image here or click to upload</div>
       <div style="font-size:12px;color:var(--muted);margin-top:4px">PNG, JPG, SVG — embedded as base64 data URL</div>`;

  setPage(`
  <div class="page-hdr">
    <h4>Workspace Settings</h4>
    <p>The logo and issuer name are injected into credentials at render time via <code style="font-size:12px;background:#e8edf8;padding:1px 6px;border-radius:4px;color:var(--navy)">{{WorkspaceLogo}}</code> and <code style="font-size:12px;background:#e8edf8;padding:1px 6px;border-radius:4px;color:var(--navy)">{{WorkspaceIssuer}}</code>.</p>
  </div>

  <div style="max-width:600px">
    <div class="section-card">
      <h6><i class="bi bi-building"></i> Issuer Identity</h6>

      <div style="margin-bottom:22px">
        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px">Issuer / Organisation Name</label>
        <input id="ws-issuer-input" class="form-control" style="font-size:14px"
               placeholder="e.g. Acme University"
               value="${(ws.issuerName || '').replace(/"/g, '&quot;')}">
        <p style="font-size:12px;color:var(--muted);margin-top:5px">
          Use <code style="font-size:11px;background:#f0f2f8;padding:1px 5px;border-radius:3px">{{WorkspaceIssuer}}</code> in any template to insert this text.
        </p>
      </div>

      <div style="margin-bottom:22px">
        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px">Logo</label>
        <div class="logo-upload-area" id="logo-drop-zone" onclick="document.getElementById('logo-file-input').click()">
          <input type="file" id="logo-file-input" accept="image/*">
          <div id="logo-preview-wrap">${logoAreaContent}</div>
        </div>
        ${ws.logo ? `<button class="btn-danger-sm" style="margin-top:8px" onclick="clearLogo()"><i class="bi bi-x-circle"></i> Remove logo</button>` : '<span id="remove-logo-slot"></span>'}
        <p style="font-size:12px;color:var(--muted);margin-top:8px">
          Use <code style="font-size:11px;background:#f0f2f8;padding:1px 5px;border-radius:3px">{{WorkspaceLogo}}</code> as the <code style="font-size:11px;background:#f0f2f8;padding:1px 5px;border-radius:3px">src</code> of an <code style="font-size:11px;background:#f0f2f8;padding:1px 5px;border-radius:3px">&lt;img&gt;</code> in a template.
        </p>
      </div>

      <div id="ws-save-err" style="display:none;color:#dc3545;font-size:12px;margin-bottom:10px"></div>
      <button class="btn-primary-cred" onclick="saveWorkspaceSettings()">
        <i class="bi bi-floppy"></i> Save Settings
      </button>
    </div>

    <!-- ── SMTP Settings ───────────────────────────────────────────────── -->
    <div class="section-card" style="margin-top:16px">
      <h6><i class="bi bi-envelope-at"></i> SMTP / Email Settings</h6>
      <p style="font-size:12px;color:var(--muted);margin-bottom:18px">Used when sending credential emails directly. Leave blank to skip.</p>

      <div class="smtp-grid">
        <div class="smtp-field">
          <label>SMTP Host</label>
          <input type="text" id="smtp-host" placeholder="smtp.example.com" value="${(smtp.host||'').replace(/"/g,'&quot;')}">
        </div>
        <div class="smtp-field">
          <label>Port</label>
          <input type="number" id="smtp-port" placeholder="587" value="${smtp.port||587}" min="1" max="65535">
        </div>
        <div class="smtp-field">
          <label>TLS</label>
          <div class="toggle-secure">
            <input type="checkbox" id="smtp-secure" style="width:16px;height:16px;cursor:pointer" ${smtp.secure ? 'checked' : ''}>
            <label for="smtp-secure" style="font-size:12px;font-weight:400;letter-spacing:0;text-transform:none;cursor:pointer">SSL/TLS (port 465)</label>
          </div>
        </div>
      </div>

      <div class="smtp-row2">
        <div class="smtp-field">
          <label>Username</label>
          <input type="text" id="smtp-user" placeholder="user@example.com" value="${(smtp.user||'').replace(/"/g,'&quot;')}">
        </div>
        <div class="smtp-field">
          <label>Password ${smtp.hasPass ? '<span style="color:#22c55e;font-weight:400;text-transform:none;letter-spacing:0">(saved)</span>' : ''}</label>
          <input type="password" id="smtp-pass" placeholder="${smtp.hasPass ? '••••••••  (leave blank to keep)' : 'Enter password'}">
        </div>
      </div>

      <div class="smtp-field" style="margin-bottom:18px">
        <label>From Address</label>
        <input type="text" id="smtp-from" placeholder="noreply@example.com" value="${(smtp.fromAddress||'').replace(/"/g,'&quot;')}" style="max-width:320px">
        <p style="font-size:11px;color:var(--muted);margin-top:4px">Appears as the sender on all outgoing credential emails.</p>
      </div>

      <div id="smtp-save-err" style="display:none;color:#dc3545;font-size:12px;margin-bottom:10px"></div>
      <button class="btn-primary-cred" onclick="saveSmtpSettings()">
        <i class="bi bi-floppy"></i> Save SMTP Settings
      </button>

      <hr style="border-color:var(--bdr);margin:20px 0 16px">

      <h6 style="margin-bottom:12px"><i class="bi bi-send"></i> Send Test Email</h6>
      <div class="smtp-test-row">
        <input type="text" id="smtp-test-to" placeholder="recipient@example.com">
        <button class="btn-outline-cred btn-sm-cred" onclick="sendSmtpTest()">
          <i class="bi bi-send"></i> Send Test
        </button>
      </div>
      <div id="smtp-test-result" class="smtp-test-result"></div>
    </div>
  </div>`);

  // File input handler
  document.getElementById('logo-file-input').addEventListener('change', function() {
    if (this.files[0]) loadLogoFile(this.files[0]);
  });

  // Drag-and-drop
  const dz = document.getElementById('logo-drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('drag-over'); });
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadLogoFile(file);
  });
}

function loadLogoFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    _pendingLogo = e.target.result;
    const wrap = document.getElementById('logo-preview-wrap');
    if (wrap) {
      wrap.innerHTML = `<img id="logo-preview-img" class="logo-preview" src="${_pendingLogo}" alt="Logo preview">
        <div style="font-size:12px;color:var(--muted)">Click or drop to replace</div>`;
    }
    // Show remove button if not already there
    const slot = document.getElementById('remove-logo-slot');
    if (slot) slot.outerHTML = `<button class="btn-danger-sm" style="margin-top:8px" onclick="clearLogo()"><i class="bi bi-x-circle"></i> Remove logo</button>`;
  };
  reader.readAsDataURL(file);
}

function clearLogo() {
  _pendingLogo = null;
  const wrap = document.getElementById('logo-preview-wrap');
  if (wrap) {
    wrap.innerHTML = `<i class="bi bi-image" style="font-size:32px;color:var(--navy);opacity:0.3;display:block;margin-bottom:8px"></i>
      <div style="font-size:13px;font-weight:600">Drop image here or click to upload</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">PNG, JPG, SVG — embedded as base64 data URL</div>`;
  }
  // Replace remove button with a slot placeholder
  const removeBtn = document.querySelector('.btn-danger-sm');
  if (removeBtn) removeBtn.outerHTML = '<span id="remove-logo-slot"></span>';
}
window.clearLogo = clearLogo;

async function saveWorkspaceSettings() {
  const issuerName = (document.getElementById('ws-issuer-input')?.value || '').trim();
  const errEl = document.getElementById('ws-save-err');
  try {
    await API.put('/api/workspace', { issuerName, logo: _pendingLogo || '' });
    toast('Workspace settings saved');
    loadWorkspaceIdentity();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}
window.saveWorkspaceSettings = saveWorkspaceSettings;

async function saveSmtpSettings() {
  const errEl = document.getElementById('smtp-save-err');
  errEl.style.display = 'none';
  const issuerName = (document.getElementById('ws-issuer-input')?.value || '').trim();
  const smtp = {
    host: (document.getElementById('smtp-host')?.value || '').trim(),
    port: parseInt(document.getElementById('smtp-port')?.value || '587', 10),
    secure: document.getElementById('smtp-secure')?.checked || false,
    user: (document.getElementById('smtp-user')?.value || '').trim(),
    pass: document.getElementById('smtp-pass')?.value || '',
    fromAddress: (document.getElementById('smtp-from')?.value || '').trim(),
  };
  try {
    await API.put('/api/workspace', { issuerName, logo: _pendingLogo || '', smtp });
    toast('SMTP settings saved');
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}
window.saveSmtpSettings = saveSmtpSettings;

async function sendSmtpTest() {
  const to = (document.getElementById('smtp-test-to')?.value || '').trim();
  const resultEl = document.getElementById('smtp-test-result');
  if (!to) { resultEl.innerHTML = '<span style="color:#dc3545">Enter a recipient address first.</span>'; return; }
  resultEl.innerHTML = '<span style="color:var(--muted)"><i class="bi bi-arrow-repeat spin"></i> Sending…</span>';
  try {
    await API.post('/api/workspace/smtp/test', { to });
    resultEl.innerHTML = `<span style="color:#22c55e"><i class="bi bi-check-circle-fill"></i> Test email sent to ${to}</span>`;
  } catch(e) {
    resultEl.innerHTML = `<span style="color:#dc3545"><i class="bi bi-x-circle-fill"></i> ${e.message}</span>`;
  }
}
window.sendSmtpTest = sendSmtpTest;

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('btn-connect').addEventListener('click', doConnect);
document.getElementById('inp-token-url').addEventListener('keydown', e => { if (e.key === 'Enter') doConnect(); });
document.getElementById('btn-enter').addEventListener('click', doEnterApp);
document.getElementById('btn-back').addEventListener('click', doBackToInput);
document.getElementById('btn-logout').addEventListener('click', doLogout);
window.addEventListener('hashchange', route);

// Pre-fill token URL if redirected from a Chainletter shortlink (?link=...)
(function() {
  const params = new URLSearchParams(window.location.search);
  const link = params.get('link');
  if (link) {
    document.getElementById('inp-token-url').value = link;
    // Clean up URL without reload
    history.replaceState(null, '', window.location.pathname + window.location.hash);
  }
})();

(async () => {
  if (S.token) {
    // Check if token is expired locally before hitting the server
    if (S.expires && Date.now() > new Date(S.expires).getTime()) {
      S.token = ''; localStorage.removeItem('credcli_session');
      return;
    }
    try {
      await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${S.token}` } })
        .then(r => { if (!r.ok) throw new Error('expired'); });
      showApp();
      route();
    } catch {
      S.token = ''; localStorage.removeItem('credcli_session');
    }
  }
})();
</script>
</body>
